# log_level = "info"

[tailscale]
hostname = "waypoint-db"
state_dir = "/var/lib/waypoint/tsnet"
# Auth key (or set TS_AUTHKEY env var):
# auth_key = "${TS_AUTHKEY}"
# control_url = "https://controlplane.tailscale.com"
# ephemeral = false
# advertise_tags = ["tag:waypoint"]
#
# OAuth client credentials (requires advertise_tags):
# client_secret = "${TS_CLIENT_SECRET}"
# advertise_tags = ["tag:waypoint"]
#
# Workload Identity Federation (requires client_id + advertise_tags):
# client_id = "your-client-id"
# id_token = "${WIF_ID_TOKEN}"
# audience = "https://login.tailscale.com"
# advertise_tags = ["tag:waypoint"]

[provisioning]
# allow_raw_sql = true   # set to false to disable raw SQL in ACL grants (presets only)

[redis]
address = "localhost:6379"
# password = ""
# db = 0
key_prefix = "waypoint:"
# service_name = "redis"   # peer.service for OTel traces (default: "redis")

[revalidation]
interval = "1m"

[defaults.limits]
max_conns_total = 200

# [metrics]
# endpoint = "http://localhost:4318"   # OTLP endpoint (enables metrics when set)
# protocol = "http"                     # "http" (default) or "grpc"
# interval = "30s"                      # export interval
# temporality = "delta"                 # "delta" (default, recommended for Datadog) or "cumulative"
# tracing_sample_rate = 0.0            # 0 = disabled, 1.0 = trace all requests
#
# [metrics.enable]
# # Each key is a metric name — presence enables it. Value is the tag allow-list.
# # Use ["*"] for all tags, [] for no tags.
# "waypoint.conn.active"      = ["listener", "mode", "backend"]
# "waypoint.conn.total"       = ["listener", "mode"]
# "waypoint.conn.duration"    = ["listener", "user", "backend"]
# "waypoint.conn.rejected"    = ["listener", "mode"]
# "waypoint.handshake.aborted" = ["listener", "mode"]  # benign client disconnects during handshake
# "waypoint.auth.attempts"    = ["listener"]
# "waypoint.auth.failures"    = ["listener"]
# "waypoint.auth.latency"     = ["listener", "backend"]
# "waypoint.reval.attempts"   = ["listener"]
# "waypoint.reval.failures"   = ["listener"]
# "waypoint.bytes.read"       = ["listener", "user"]
# "waypoint.bytes.written"    = ["listener", "user"]
# "waypoint.limit.violations" = ["listener", "limit_type"]
# "waypoint.provision.total"  = ["listener"]
# "waypoint.provision.latency" = ["listener"]
# "waypoint.provision.errors" = ["listener"]
# "waypoint.cleanup.runs"     = []
# "waypoint.cleanup.dropped"  = []
# "waypoint.redis.op_duration" = ["operation"]
# "waypoint.redis.errors"     = ["operation"]
# "waypoint.system.listeners" = []

[[listeners]]
name = "pg-main"
listen = ":5432"
mode = "postgres"
backend = "10.0.1.10:5432"
tls_mode = "optional"                   # off | optional | require
use_tailscale_tls = true                # set false to use only cert_file/key_file
# cert_file = "/etc/waypoint/server.crt" # optional custom-domain cert
# key_file = "/etc/waypoint/server.key"

[listeners.postgres]
admin_user = "waypoint_admin"
admin_password = "${PG_ADMIN_PASSWORD}"
admin_database = "postgres"
user_prefix = "wp_"
user_ttl = "24h"
# service_name = "my-prod-db"   # peer.service override for OTel (default: listener name)

[[listeners]]
name = "raw-mysql"
listen = ":3306"
mode = "tcp"
backend = "10.0.1.5:3306"

# Example: MongoDB replica set reachable only from Waypoint over Tailscale.
# Clients connect to waypoint-db:27017, waypoint-db:27018, and waypoint-db:27019;
# Waypoint rewrites MongoDB topology responses so drivers never connect directly
# to the production member addresses.
# [[listeners]]
# name = "mongo-prod"
# listen = ":27017"          # first listener port when using mongodb.srv
# mode = "mongodb"
# backend_via_tailscale = true
# tls = true                # optional: use TLS to MongoDB backends
# tls_mode = "require"      # off | optional | require for clients
# use_tailscale_tls = true  # set false to use only cert_file/key_file
# cert_file = "/etc/waypoint/mongo.crt" # optional custom-domain cert
# key_file = "/etc/waypoint/mongo.key"
# advertise = "waypoint-db:27017" # optional host override; member ports are preserved
#
# [listeners.mongodb]
# admin_user = "waypoint_admin"
# admin_password = "${MONGO_ADMIN_PASSWORD}"
# auth_database = "admin"
# user_prefix = "wp_"
# user_ttl = "24h"
# replica_set = "rs0"
# srv = "cluster.example.com" # resolves _mongodb._tcp.cluster.example.com
# srv_max_members = 3         # binds :27017, :27018, and :27019
#
# [listeners.mongodb.provision]
# mode = "database" # default: create/update scoped MongoDB users
#
# For Atlas or clusters where MongoDB user-management commands are unavailable,
# use pre-created static backend users instead:
# [listeners.mongodb.provision]
# mode = "static"
#
# [[listeners.mongodb.provision.static_users]]
# name = "app-readwrite"
# username = "atlas_app_rw"
# password = "${MONGO_APP_RW_PASSWORD}"
# auth_database = "admin"
# database = "app"
# permissions = ["readwrite"]
#
# [[listeners.mongodb.provision.static_users]]
# name = "readonly"
# username = "atlas_readonly"
# password = "${MONGO_READONLY_PASSWORD}"
# auth_database = "admin"
# permissions = ["readonly"]
#
# Or omit srv/srv_max_members and configure explicit members:
# [[listeners.mongodb.members]]
# backend = "mongo1.prod.internal:27017"
# listen = ":27017"
# advertise = "waypoint-db:27017"
#
# [[listeners.mongodb.members]]
# backend = "mongo2.prod.internal:27017"
# listen = ":27018"
# advertise = "waypoint-db:27018"
#
# [[listeners.mongodb.members]]
# backend = "mongo3.prod.internal:27017"
# listen = ":27019"
# advertise = "waypoint-db:27019"

# Example: backend reachable only via Tailscale (MagicDNS name or 100.x.y.z IP).
# [[listeners]]
# name = "ts-backend"
# listen = ":6379"
# mode = "tcp"
# backend = "my-redis.tail-scale.ts.net:6379"
# backend_via_tailscale = true

