[tailscale]
hostname = "waypoint-db"
state_dir = "/var/lib/waypoint/tsnet"
# Auth key (or set TS_AUTHKEY env var):
# auth_key = "${TS_AUTHKEY}"
# control_url = "https://controlplane.tailscale.com"
# ephemeral = false
# advertise_tags = ["tag:waypoint"]
#
# OAuth client credentials (requires advertise_tags):
# client_secret = "${TS_CLIENT_SECRET}"
# advertise_tags = ["tag:waypoint"]
#
# Workload Identity Federation (requires client_id + advertise_tags):
# client_id = "your-client-id"
# id_token = "${WIF_ID_TOKEN}"
# audience = "https://login.tailscale.com"
# advertise_tags = ["tag:waypoint"]

[redis]
address = "localhost:6379"
# password = ""
# db = 0
key_prefix = "waypoint:"

[revalidation]
interval = "1m"

[defaults.limits]
max_conns_total = 200

# [metrics]
# endpoint = "http://localhost:4318"   # OTLP HTTP endpoint (enables metrics when set)
# interval = "30s"                      # export interval
#
# [metrics.enable]
# # Each key is a metric name — presence enables it. Value is the tag allow-list.
# # Use ["*"] for all tags, [] for no tags.
# "waypoint.conn.active"      = ["listener", "mode", "backend"]
# "waypoint.conn.total"       = ["listener", "mode"]
# "waypoint.conn.duration"    = ["listener", "user", "backend"]
# "waypoint.conn.rejected"    = ["listener", "mode"]
# "waypoint.auth.attempts"    = ["listener"]
# "waypoint.auth.failures"    = ["listener"]
# "waypoint.auth.latency"     = ["listener", "backend"]
# "waypoint.reval.attempts"   = ["listener"]
# "waypoint.reval.failures"   = ["listener"]
# "waypoint.bytes.read"       = ["listener"]
# "waypoint.bytes.written"    = ["listener"]
# "waypoint.limit.violations" = ["listener", "limit_type"]
# "waypoint.provision.total"  = ["listener"]
# "waypoint.provision.latency" = ["listener"]
# "waypoint.provision.errors" = ["listener"]
# "waypoint.cleanup.runs"     = []
# "waypoint.cleanup.dropped"  = []
# "waypoint.redis.op_duration" = ["operation"]
# "waypoint.redis.errors"     = ["operation"]
# "waypoint.system.listeners" = []

[[listeners]]
name = "pg-main"
listen = ":5432"
mode = "postgres"
backend = "10.0.1.10:5432"

[listeners.postgres]
admin_user = "waypoint_admin"
admin_password = "${PG_ADMIN_PASSWORD}"
admin_database = "postgres"
user_prefix = "wp_"
user_ttl = "24h"

[[listeners]]
name = "raw-mysql"
listen = ":3306"
mode = "tcp"
backend = "10.0.1.5:3306"

# Example: backend reachable only via Tailscale (MagicDNS name or 100.x.y.z IP).
# [[listeners]]
# name = "ts-backend"
# listen = ":6379"
# mode = "tcp"
# backend = "my-redis.tail-scale.ts.net:6379"
# backend_via_tailscale = true

# Example: register as a Tailscale Service (requires tagged node + ACL auto-approval).
